name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: mux/go.sum

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Lint (Go)
        working-directory: mux
        run: |
          go vet ./...
          staticcheck ./...

      - name: Lint (ShellCheck)
        run: shellcheck -s bash -S warning xnullclaw

      - name: Test
        run: cd mux && CGO_ENABLED=1 go test -count=1 -race ./...

      - name: Build
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          mkdir -p build
          cd mux && CGO_ENABLED=1 go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o ../build/xnc-mux .
