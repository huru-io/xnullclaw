name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Vet
        run: go vet ./...

      - name: Test
        run: CGO_ENABLED=0 go test -count=1 ./...

      - name: Race detection
        run: CGO_ENABLED=1 go test -race -count=1 ./...

      - name: Build
        run: make build

      - name: Cross-compile
        run: make cross
